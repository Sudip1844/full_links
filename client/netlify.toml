# Static HTML Build Configuration for MovieZone Admin Panel
[build]
  publish = "."
  command = "echo 'Static HTML build - no build step required'"

[build.environment]
  NODE_VERSION = "20"

# Short link routes to RedirectPage for countdown/ads UI
[[redirects]]
  from = "/m/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/e/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/z/*"
  to = "/index.html"
  status = 200

# SPA routing for admin panel
[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/redirect"
  to = "/index.html"
  status = 200

# API proxy to backend server  
[[redirects]]
  from = "/api/*"
  to = "https://full-links.onrender.com/api/:splat"
  status = 200

# Catch-all for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_ENV = "production"
  VITE_API_URL = "https://full-links.onrender.com"

[context.deploy-preview.environment]
  NODE_ENV = "development"
  VITE_API_URL = "https://full-links.onrender.com"

[context.branch-deploy.environment]
  NODE_ENV = "development"
  VITE_API_URL = "https://full-links.onrender.com"